<body class="search-results-page">
<header>
     <nav class="navbar" aria-label="Main navigation">
      <button class="hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-menu">
        <span class="bar"></span>

        <span class="bar"></span>

      <div class="nav-right">

      <ul class="nav-menu" id="nav-menu">

</header>

  <main class="main">
    <!--Spot for filers -->
    <aside class = "filters">
      <h3>Filters</h3>
      
<div class = "desktopBtns">
      <p class = p>Price Range</p>
      <p class = m>Make & Model</p>
      <button class = "whitebtn">Make</button>
      <button class = "whitebtn">Model</button>
      <button class = "whitebtn">Year</button>
      <button class = "orangebtn">Apply</button>
</div>

<div class = "mobileBtns">
<button class = "mobileFilter">Filters</button>
<button class = "mobileSort">Sort by Price</button>
  </div>
</aside>


    <!-- Search Results -->
    <section class = "results">
      <div class = resultHeader>
    <h1 class = "resultTitle">Showing x cars in [location]</h1>
    <button class ="srtbtn">Sort by ▼</button>
</div>


      <!--Cards -->
<div class = "container">
<a href = "car-details.html?car=toyota-supra" class = "card" id = "card1">

</a>

</a>
